<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-image: url('garden.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .success-card {
            background: rgba(255, 255, 255, 0.88);
            padding: 30px;
            border-radius: 25px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            position: relative;
            z-index: 10;
        }

        .typing-text {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #333;
            font-family: 'Georgia', serif;
            min-height: 150px;
            text-align: left;
            margin-top: 15px;
        }

        @media (min-width: 768px) {
            .typing-text { font-size: 1.3rem; line-height: 1.8; }
            .success-card { padding: 40px; }
        }
    </style>
</head>
<body>

    <div class="success-card">
        <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=600&q=80" 
             style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid white;" alt="Rose">
        
        <h1 id="title" style="font-size: 2rem;">Wait for it...</h1>
        <div id="typed-message" class="typing-text"></div>
    </div>

    <script>
        const message = "I spent so much time making that 'No' button run away, but the truth is, I’d never want you to leave. Every time I see your smile, the world feels a little more quiet and a lot more beautiful. You aren't just a choice to me, Ammadi... you're the dream I never want to wake up from. Thank you for clicking 'Yes'.";
        
        let i = 0;
        function typeWriter() {
            if (i === 0) document.getElementById("title").innerHTML = "I Knew You'd Say Yes! ❤️";
            if (i < message.length) {
                document.getElementById("typed-message").innerHTML += message.charAt(i);
                i++;
                setTimeout(typeWriter, 40);
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = Math.random() * 20 + 10 + "px";
            heart.style.animationDuration = Math.random() * 2 + 3 + "s";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }

        setInterval(createHeart, 400);
        window.onload = typeWriter;
    </script>
</body>
</html>
